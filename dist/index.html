<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>달려오리 DALLYEORI</title>
  <!-- build-marker: 2026-03-31 결과창 한판더 제거·경기장 rematch 전용 — 페이지 소스 보기로 이 줄 있는지 확인 -->
  <!-- CSS는 모듈 import 금지 — 동일 폴더의 실제 파일만 링크 -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #000;
      font-family: system-ui, sans-serif;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CxGnn19E.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BtP7lbnV.css">
</head>
<body>
  <div id="game-root">
    <canvas id="game-canvas" class="is-hidden" aria-label="달려오리 게임 화면"></canvas>
    <div id="app-root"></div>
  </div>
  <!-- 인앱 웹뷰(카톡·라인 등) → 외부 브라우저. QR/일반 브라우저 UA는 여기 해당 없음 -->
  <script>
    (function () {
      var ua = typeof navigator !== 'undefined' ? navigator.userAgent || '' : '';
      var U = ua.toUpperCase();

      function isInAppWebView() {
        if (U.indexOf('KAKAOTALK') !== -1) return true;
        if (U.indexOf('FB_IAB') !== -1 || U.indexOf('FBAN') !== -1 || U.indexOf('FBIOS') !== -1) return true;
        if (U.indexOf('INSTAGRAM') !== -1) return true;
        if (U.indexOf('LINE/') !== -1) return true;
        if (U.indexOf('DAUMAPP') !== -1) return true;
        /* 네이버 **인앱**만 (모바일+NAVER 단독은 웨일·일반 웹뷰 오인 → 검은 화면/intent 실패) */
        if (U.indexOf('NAVER(INAPP') !== -1) return true;
        if (U.indexOf('NAVER; INAPP') !== -1) return true;
        return false;
      }

      if (!isInAppWebView()) return;

      /* QR 게스트 (?qr & t) — app.js 가 먼저 쿼리를 지운 뒤 intent 가 열리면 외부 탭에 토큰 누락됨 → 백업 */
      try {
        var __iap = new URLSearchParams(window.location.search);
        var __q = __iap.get('qr');
        var __tv = __iap.get('t');
        if (__q && __tv) {
          sessionStorage.setItem('dallyeori_qr_pending', JSON.stringify({ code: __q, token: __tv }));
        }
      } catch (e) {}

      var fullUrl = window.location.href;
      var host = window.location.host;
      var pathQs = window.location.pathname + window.location.search;

      function tryAndroidChromeIntent() {
        if (U.indexOf('ANDROID') === -1) return;
        var fallback = encodeURIComponent(fullUrl);
        var pathPart = pathQs.indexOf('#') === -1 ? pathQs : pathQs.split('#')[0];
        var intent =
          'intent://' +
          host +
          pathPart +
          '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' +
          fallback +
          ';end';
        window.location.href = intent;
      }

      function tryIosExternal() {
        if (!/IPHONE|IPAD|IPOD/i.test(U)) return;
        try {
          window.open(fullUrl, '_blank', 'noopener,noreferrer');
        } catch (e) {}
        var rest = fullUrl.replace(/^https?:\/\//i, '');
        try {
          window.location.href = 'googlechrome://' + rest;
        } catch (e2) {}
        try {
          var a = document.createElement('a');
          a.href = fullUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } catch (e3) {}
      }

      function showFallbackOverlay() {
        if (document.getElementById('dallyeori-iab-fallback')) return;
        var wrap = document.createElement('div');
        wrap.id = 'dallyeori-iab-fallback';
        wrap.setAttribute('role', 'dialog');
        wrap.style.cssText =
          'position:fixed;inset:0;z-index:2147483646;display:flex;flex-direction:column;' +
          'align-items:center;justify-content:center;padding:24px;box-sizing:border-box;' +
          'background:linear-gradient(180deg,#0d1117,#000);color:#fff;font-family:system-ui,sans-serif;text-align:center;';
        var p = document.createElement('p');
        p.textContent = '게임은 외부 브라우저에서 실행됩니다. 아래 버튼을 눌러 주세요.';
        p.style.cssText = 'font-size:15px;line-height:1.5;opacity:0.92;max-width:320px;margin-bottom:20px;';
        var btn = document.createElement('a');
        btn.textContent = '게임 시작하기';
        btn.href = fullUrl;
        btn.target = '_blank';
        btn.rel = 'noopener noreferrer';
        btn.style.cssText =
          'display:inline-block;padding:16px 36px;font-size:18px;font-weight:700;border-radius:14px;' +
          'background:#4CAF50;color:#fff;text-decoration:none;box-shadow:0 4px 20px rgba(76,175,80,0.35);';
        btn.addEventListener('click', function () {
          if (U.indexOf('ANDROID') !== -1) {
            tryAndroidChromeIntent();
          } else {
            tryIosExternal();
          }
        });
        wrap.appendChild(p);
        wrap.appendChild(btn);
        document.body.appendChild(wrap);
      }

      var pageLikelyBackground = false;
      document.addEventListener(
        'visibilitychange',
        function () {
          if (document.hidden) pageLikelyBackground = true;
        },
        { passive: true },
      );
      window.addEventListener(
        'pagehide',
        function () {
          pageLikelyBackground = true;
        },
        { passive: true },
      );

      if (U.indexOf('ANDROID') !== -1) tryAndroidChromeIntent();
      else tryIosExternal();

      window.setTimeout(function () {
        if (pageLikelyBackground || document.hidden) return;
        showFallbackOverlay();
      }, 900);
    })();
  </script>
</body>
</html>
