<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MADUCK Run — Three.js 프로토타입 (달려오리)</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #87c5ff; font-family: system-ui, sans-serif; }
    #info {
      position: fixed; left: 12px; bottom: 12px; right: 12px;
      padding: 10px 14px; background: rgba(0,0,0,.55); color: #fff;
      font-size: 13px; line-height: 1.45; border-radius: 10px; z-index: 10; pointer-events: none;
    }
    #info kbd { background: #333; padding: 2px 6px; border-radius: 4px; }
    #hud {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; background: rgba(0,0,0,.6); color: #fff;
      font-size: 18px; font-weight: 700; border-radius: 10px; z-index: 12; pointer-events: none;
      text-align: center; min-width: 200px;
    }
    #hud .sub { font-size: 13px; font-weight: 500; opacity: .85; margin-top: 4px; }
    #cdOverlay {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; z-index: 20; font-size: min(22vw, 120px); font-weight: 900;
      color: #fff; text-shadow: 0 4px 24px rgba(0,0,0,.5); letter-spacing: -0.02em;
      gap: 12px;
    }
    #cdOverlay .cd-sub {
      font-size: min(5vw, 28px); font-weight: 600; opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="cdOverlay" aria-hidden="true"></div>
  <div id="hud" aria-live="polite">
    <span id="hudTime">13.0</span>초
    <div class="sub" id="hudSub"></div>
  </div>
  <div id="info">
    ← 왼발 | → 오른발
  </div>
  <!-- file:// 더블클릭 동작: three r128 (cdnjs), OrbitControls 미사용 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
  var THREE = window.THREE;

  const DUCK_MASS = 3.5;
  const TAP_FORCE = 1.8;
  const MAX_SPEED = 4.5;
  const AIR_RESISTANCE = 0.02;
  const NORMAL_FRICTION = 0.85;
  const SLIDE_DECAY = 0.95;
  const ANGLE_RECOVERY = 0.18;
  const SAME_FOOT_IMPULSE_RATIO = 0.38;
  const SAME_FOOT_DIR_OFFSET = 0.18;

  const RACE_LIMIT_S = 13;
  const COUNTDOWN_PREWAIT_S = 1;
  const COUNTDOWN_DIGIT_S = 1;
  const GO_DISPLAY_S = 0.65;
  const DIR_A_LIMIT = 1.57;
  const IDLE_ENTER = 0.15;
  const PLAYER_LANE_X = -1.25;
  const BOT_LANE_X = 1.25;
  const LANE_LATERAL_MAX = 1.25;
  let boostTimer = 0;
  let botV = 0;
  let botDist = 0;
  let botLateral = 0;
  let botDirA = 0;
  let botLastFoot = null;
  let botNextTapTime = 0;
  let botRunPhase = 0;
  const BOT_BASE_INTERVAL = 180;
  const BOT_VARIANCE = 40;
  const BOT_MISS_CHANCE = 0.08;
  let finishOverlayMain = '';
  let finishOverlaySub = '';
  let finishColor = '#fff';
  const BASE_CAMERA_FOV = 63;
  /** 월드 고정 트랙 Z방향 길이(m) — 오리만 이동, 경기장은 절대 따라가지 않음 */
  const TRACK_WORLD_LEN = 400;
  /** 트랙 진행 방향 줄무늬 간격(m) — 고정 메시 위에서 오리 z 이동으로 발 밑으로 지나감 */
  const TRACK_STRIPE_SPACING_M = 0.3;

  let renderer, scene, camera;
  let duckRoot, bodySquashGroup, torsoMesh, headGroup, tailPivot, wingL, wingR;
  let legLU, legLL, footL, legRU, legRL, footR;
  let ground, trackMesh, decorGroup, laneLineL, laneLineR, trackStripeTex, distMarkersGroup;
  const hudTimeEl = typeof document !== 'undefined' ? document.getElementById('hudTime') : null;
  const hudSubEl = typeof document !== 'undefined' ? document.getElementById('hudSub') : null;
  const cdOverlayEl = typeof document !== 'undefined' ? document.getElementById('cdOverlay') : null;
  const infoEl = typeof document !== 'undefined' ? document.getElementById('info') : null;

  const clock = new THREE.Clock();

  /** 애니메이션 전용 (물리 속도와 분리) */
  const run = {
    phase: 0,
    idleT: 0,
    lastTapT: -999,
    squashT: 0,
    dipImpulse: 0,
    wasContact: false,
  };

  let v = 0;
  let dist = 0;
  let lateral = 0;
  let dirA = 0;
  let lastFoot = null;
  let inputLocked = false;
  let gameStarted = false;
  let gameEnded = false;
  let raceTimeLeft = RACE_LIMIT_S;
  let waitBeforeCd = 0;
  let cdElapsed = 0;
  /** step 직후 렌더용 (카메라/회전) */
  let lastEffA = 0;
  /** 카운트다운 중 탭 시 제자리뛰기 애니 길이 */
  let countdownJogT = 0;
  let wobbleImpulse = 0;
  let botWobbleImpulse = 0;
  var playerDuck = null;
  var botDuck = null;
  let botRoot = null;
  const botAnim = {
    phase: 0,
    idleT: 0,
    squashT: 0,
    dipImpulse: 0,
    wasContact: false,
  };

  function clayMat(hex, r = 0.88, m = 0.04) {
    return new THREE.MeshStandardMaterial({
      color: hex, roughness: r, metalness: m,
    });
  }

  function moveTowardVal(current, target, maxStep) {
    if (current === target) return target;
    const d = target - current;
    if (Math.abs(d) <= maxStep) return target;
    return current + Math.sign(d) * maxStep;
  }

  /** 트랙 진행 방향(Z) 줄무늬 — 밝은 갈색/어두운 갈색 (TRACK_STRIPE_SPACING_M 주기) */
  function makeTrackStripeTexture() {
    const c = document.createElement('canvas');
    c.width = 4;
    c.height = 32;
    const cx = c.getContext('2d');
    const h = 16;
    cx.fillStyle = '#3e2723';
    cx.fillRect(0, 0, 4, h);
    cx.fillStyle = '#8d6e63';
    cx.fillRect(0, h, 4, h);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 4;
    tex.repeat.set(1, TRACK_WORLD_LEN / TRACK_STRIPE_SPACING_M);
    return tex;
  }

  let audioCtx = null;
  function ensureAudioCtx() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      try {
        audioCtx.resume();
      } catch (e) {}
    }
  }

  function playFootstep() {
    ensureAudioCtx();
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200 + Math.random() * 100;
    gain.gain.value = 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
  }

  /**
   * @param {'L'|'R'} foot
   */
  function onStep(foot) {
    if (inputLocked || gameEnded) return;
    playFootstep();
    run.squashT = 1;
    run.phase += Math.PI * 0.5;
    wobbleImpulse = 0.15 * (foot === 'L' ? 1 : -1);
    if (!gameStarted) {
      countdownJogT = 0.38;
      return;
    }
    var sameFoot = foot === lastFoot;
    var imp = (TAP_FORCE / DUCK_MASS) * NORMAL_FRICTION;
    if (sameFoot) {
      imp *= SAME_FOOT_IMPULSE_RATIO;
      dirA += (foot === 'L' ? -1 : 1) * SAME_FOOT_DIR_OFFSET;
    } else {
      if (dirA > 0) dirA = Math.max(0, dirA - ANGLE_RECOVERY);
      else if (dirA < 0) dirA = Math.min(0, dirA + ANGLE_RECOVERY);
    }
    v = Math.min(v + imp, MAX_SPEED);
    lastFoot = foot;
    dirA = Math.max(-DIR_A_LIMIT, Math.min(DIR_A_LIMIT, dirA));
  }

  function createDuck(collarColor) {
    const black = clayMat(0x1c1c1e);
    const orange = clayMat(0xff6a2d, 0.82);
    const white = clayMat(0xf5f5f5, 0.9);
    const pupil = clayMat(0x0a0a0a, 0.75);
    const collarMat = clayMat(collarColor, 0.82);
    const emblemMat = clayMat(collarColor, 0.82);

    const root = new THREE.Group();
    root.position.set(0, 0, 0);

    const bodySquash = new THREE.Group();
    root.add(bodySquash);

    const bodyGeo = new THREE.SphereGeometry(0.52, 48, 40);
    bodyGeo.scale(1.05, 1.18, 0.92);
    const belly = new THREE.Mesh(bodyGeo, black);
    belly.position.y = 0.62;
    belly.castShadow = true;
    bodySquash.add(belly);

    const collar = new THREE.Mesh(
      new THREE.TorusGeometry(0.38, 0.09, 16, 48),
      collarMat
    );
    collar.rotation.x = Math.PI / 2;
    collar.position.set(0, 1.12, 0);
    collar.castShadow = true;
    bodySquash.add(collar);

    const logo = new THREE.Mesh(new THREE.TorusGeometry(0.055, 0.018, 12, 24), emblemMat);
    logo.position.set(0, 1.12, 0.36);
    logo.rotation.y = 0;
    bodySquash.add(logo);

    const head = new THREE.Group();
    head.position.set(0, 1.38, 0.06);
    bodySquash.add(head);

    const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.44, 40, 32), black);
    headMesh.castShadow = true;
    head.add(headMesh);

    const hairGroup = new THREE.Group();
    head.add(hairGroup);
    for (let i = -1; i <= 1; i++) {
      const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 10), black);
      tuft.position.set(i * 0.12, 0.46, -0.02);
      tuft.scale.set(0.7, 1.15, 0.65);
      hairGroup.add(tuft);
    }

    const browGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.22, 8, 1);
    const browL = new THREE.Mesh(browGeo, black);
    browL.rotation.z = 0.55;
    browL.rotation.x = 0.2;
    browL.position.set(-0.16, 0.08, 0.38);
    head.add(browL);
    const browR = new THREE.Mesh(browGeo, black);
    browR.rotation.z = -0.55;
    browR.rotation.x = 0.2;
    browR.position.set(0.16, 0.08, 0.38);
    head.add(browR);

    const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.11, 16, 12), white);
    eyeWhite.position.set(-0.17, 0.02, 0.39);
    head.add(eyeWhite);
    const eyeWhite2 = eyeWhite.clone();
    eyeWhite2.position.x = 0.17;
    head.add(eyeWhite2);
    const pup = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), pupil);
    pup.position.set(-0.15, 0.02, 0.47);
    head.add(pup);
    const pup2 = pup.clone();
    pup2.position.set(0.19, 0.02, 0.47);
    head.add(pup2);

    const beak = new THREE.Mesh(new THREE.SphereGeometry(0.16, 20, 16), orange);
    beak.scale.set(1.35, 0.65, 0.85);
    beak.position.set(0, -0.06, 0.48);
    head.add(beak);

    const wingGeo = new THREE.SphereGeometry(0.22, 16, 12);
    wingGeo.scale(0.35, 0.75, 1);
    const leftWing = new THREE.Mesh(wingGeo, black);
    leftWing.position.set(-0.52, 0.75, -0.02);
    leftWing.rotation.z = 0.25;
    leftWing.rotation.y = -0.15;
    leftWing.castShadow = true;
    bodySquash.add(leftWing);
    const rightWing = leftWing.clone();
    rightWing.position.x = 0.52;
    rightWing.rotation.z = -0.25;
    rightWing.rotation.y = 0.15;
    bodySquash.add(rightWing);

    const tail = new THREE.Group();
    tail.position.set(0, 0.72, -0.48);
    bodySquash.add(tail);
    const tailMesh = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.28, 12), black);
    tailMesh.rotation.x = -Math.PI / 2 + 0.35;
    tailMesh.position.set(0, 0.05, -0.12);
    tailMesh.castShadow = true;
    tail.add(tailMesh);

    function makeLeg(side) {
      const hip = new THREE.Group();
      hip.position.set(side * 0.22, 0.38, 0);
      bodySquash.add(hip);
      const upper = new THREE.Mesh(
        new THREE.CylinderGeometry(0.11, 0.11, 0.24, 12, 1),
        orange
      );
      upper.position.y = -0.12;
      upper.castShadow = true;
      hip.add(upper);
      const lower = new THREE.Group();
      lower.position.y = -0.22;
      hip.add(lower);
      const shin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.09, 0.18, 10, 1),
        orange
      );
      shin.position.y = -0.1;
      shin.castShadow = true;
      lower.add(shin);
      const foot = new THREE.Mesh(new THREE.SphereGeometry(0.16, 14, 10), orange);
      foot.scale.set(1.5, 0.35, 2.1);
      foot.position.y = -0.22;
      foot.castShadow = true;
      lower.add(foot);
      return { hip, lower, foot };
    }
    const L = makeLeg(-1);
    const R = makeLeg(1);

    return {
      root,
      body: bodySquash,
      head,
      hairGroup,
      leftLeg: { hip: L.hip, lower: L.lower, foot: L.foot },
      rightLeg: { hip: R.hip, lower: R.lower, foot: R.foot },
      leftWing,
      rightWing,
      tail,
      belly,
    };
  }

  function assignPlayerRefsFromDuck(d) {
    duckRoot = d.root;
    bodySquashGroup = d.body;
    headGroup = d.head;
    torsoMesh = d.belly;
    tailPivot = d.tail;
    wingL = d.leftWing;
    wingR = d.rightWing;
    legLU = d.leftLeg.hip;
    legLL = d.leftLeg.lower;
    footL = d.leftLeg.foot;
    legRU = d.rightLeg.hip;
    legRL = d.rightLeg.lower;
    footR = d.rightLeg.foot;
  }

  function botStep() {
    var foot = botLastFoot === 'L' ? 'R' : 'L';
    if (Math.random() < BOT_MISS_CHANCE) foot = botLastFoot || 'L';
    var sameFoot = foot === botLastFoot;
    var imp = (TAP_FORCE / DUCK_MASS) * NORMAL_FRICTION;
    if (sameFoot) {
      imp *= SAME_FOOT_IMPULSE_RATIO;
      botDirA += (foot === 'L' ? -1 : 1) * SAME_FOOT_DIR_OFFSET;
    } else {
      if (botDirA > 0) botDirA = Math.max(0, botDirA - ANGLE_RECOVERY);
      else if (botDirA < 0) botDirA = Math.min(0, botDirA + ANGLE_RECOVERY);
    }
    botV = Math.min(botV + imp, MAX_SPEED);
    botLastFoot = foot;
    botDirA = Math.max(-DIR_A_LIMIT, Math.min(DIR_A_LIMIT, botDirA));
    botRunPhase += Math.PI * 0.5;
    playFootstep();
    botAnim.squashT = 1;
    botAnim.phase += Math.PI * 0.5;
    botWobbleImpulse = 0.15 * (foot === 'L' ? 1 : -1);
  }

  function makeDistanceLabelSprites() {
    const g = new THREE.Group();
    for (let m = 10; m <= 100; m += 10) {
      const c = document.createElement('canvas');
      c.width = 256;
      c.height = 128;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, 256, 128);
      ctx.fillStyle = '#ffc107';
      ctx.font = 'bold 56px system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(m + 'm', 128, 64);
      const tex = new THREE.CanvasTexture(c);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sp = new THREE.Sprite(mat);
      sp.position.set(-3.5, 1.5, -m);
      sp.scale.set(3.2, 1.6, 1);
      g.add(sp);
    }
    return g;
  }

  function makeDashedStripeGroup(x) {
    const grp = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const half = TRACK_WORLD_LEN / 2;
    for (let z = -half; z < half; z += 1) {
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.05, 0.5, 1, 1), mat);
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(x, 0.021, z + 0.25);
      grp.add(dash);
    }
    return grp;
  }

  function makeWorld() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c5ff);
    scene.fog = new THREE.Fog(0xa8dcff, 15, 120);

    camera = new THREE.PerspectiveCamera(BASE_CAMERA_FOV, innerWidth / innerHeight, 0.1, 650);
    camera.position.set(0, 4.5, 8);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xfff5e6, 0x3d5c3a, 0.85);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.05);
    sun.position.set(4, 14, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 220;
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 200;
    sun.shadow.camera.bottom = -200;
    scene.add(sun);

    // 잔디·트랙·라인·마커·나무: 전부 월드 좌표 고정. animate에서 position 보간 금지.
    // 잔디 — 월드 고정 (오리/카메라만 이동)
    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(520, TRACK_WORLD_LEN + 40, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x4caf6a, roughness: 0.95, metalness: 0 })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.position.y = 0;
    grass.receiveShadow = true;
    scene.add(grass);
    ground = grass;

    // 트랙 레인 — 0.5m 줄무늬, 월드 좌표 고정
    trackStripeTex = makeTrackStripeTexture();
    trackMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(6, TRACK_WORLD_LEN, 1, 1),
      new THREE.MeshStandardMaterial({
        map: trackStripeTex,
        color: 0xffffff,
        roughness: 0.88,
        metalness: 0.02,
      })
    );
    trackMesh.rotation.x = -Math.PI / 2;
    trackMesh.position.y = 0.01;
    trackMesh.receiveShadow = true;
    scene.add(trackMesh);

    // 레인 외곽 실선
    laneLineL = new THREE.Mesh(
      new THREE.PlaneGeometry(0.08, TRACK_WORLD_LEN),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 })
    );
    laneLineL.rotation.x = -Math.PI / 2;
    laneLineL.position.set(-2.5, 0.02, 0);
    scene.add(laneLineL);
    laneLineR = laneLineL.clone();
    laneLineR.position.set(2.5, 0.02, 0);
    scene.add(laneLineR);

    scene.add(makeDashedStripeGroup(0));
    scene.add(makeDashedStripeGroup(-2.5));
    scene.add(makeDashedStripeGroup(2.5));

    distMarkersGroup = makeDistanceLabelSprites();
    scene.add(distMarkersGroup);
    decorGroup = new THREE.Group();
    scene.add(decorGroup);
    const trunkMat = clayMat(0x5d4037);
    const leafMat = clayMat(0x2e7d32, 0.9);
    for (let i = -70; i <= 70; i++) {
      if (i === 0) continue;
      const z = i * 2.8 - 1.4;
      const side = i % 2 === 0 ? -1 : 1;
      const tx = side * (5.2 + (Math.abs(i) % 3) * 0.45);
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 1.0, 8), trunkMat);
      trunk.position.set(tx, 0.5, z);
      trunk.castShadow = true;
      decorGroup.add(trunk);
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 8), leafMat);
      leaf.position.set(tx, 1.15, z);
      leaf.scale.y = 0.85;
      leaf.castShadow = true;
      decorGroup.add(leaf);
    }

    playerDuck = createDuck(0xff6b00);
    botDuck = createDuck(0xff0000);
    assignPlayerRefsFromDuck(playerDuck);
    botRoot = botDuck.root;
    duckRoot.position.set(PLAYER_LANE_X, 0, 0);
    botRoot.position.set(BOT_LANE_X, 0, 0);
    scene.add(duckRoot);
    scene.add(botRoot);
    botRoot.rotation.y = duckRoot.rotation.y;
    if (infoEl) {
      infoEl.textContent =
        'ontouchstart' in window
          ? '왼쪽탭 왼발 | 오른쪽탭 오른발'
          : '← 왼발 | → 오른발';
    }
    updateHud();
  }

  function updateHud() {
    if (!hudTimeEl || !hudSubEl) return;
    var distLine =
      '나: ' + dist.toFixed(1) + 'm | 상대: ' + botDist.toFixed(1) + 'm';
    var sub =
      'v: ' + v.toFixed(1) + ' | ' + distLine;
    if (gameEnded) {
      hudTimeEl.textContent = '0.0';
      hudSubEl.textContent = sub;
      return;
    }
    if (!gameStarted) {
      hudTimeEl.textContent = RACE_LIMIT_S.toFixed(1);
      hudSubEl.textContent = '곧 출발… 제자리에서 발 까딱 연습 OK';
      return;
    }
    hudTimeEl.textContent = Math.max(0, raceTimeLeft).toFixed(1);
    hudSubEl.textContent = sub;
  }

  function updateCdOverlay() {
    if (!cdOverlayEl) return;
    if (gameEnded) {
      cdOverlayEl.innerHTML =
        '<span style="color:' +
        finishColor +
        '">' +
        finishOverlayMain +
        '</span><div class="cd-sub">나: ' +
        dist.toFixed(1) +
        'm | 상대: ' +
        botDist.toFixed(1) +
        'm</div>';
      return;
    }
    if (waitBeforeCd < COUNTDOWN_PREWAIT_S) {
      cdOverlayEl.textContent = '';
      return;
    }
    var t = cdElapsed;
    if (t < COUNTDOWN_DIGIT_S) cdOverlayEl.textContent = '3';
    else if (t < COUNTDOWN_DIGIT_S * 2) cdOverlayEl.textContent = '2';
    else if (t < COUNTDOWN_DIGIT_S * 3) cdOverlayEl.textContent = '1';
    else if (t < COUNTDOWN_DIGIT_S * 3 + GO_DISPLAY_S) cdOverlayEl.textContent = 'GO!';
    else cdOverlayEl.textContent = '';
  }

  window.addEventListener('pointerdown', (e) => {
    if (inputLocked) return;
    var x = e.clientX;
    if (x < window.innerWidth * 0.5) onStep('L');
    else onStep('R');
  });
  window.addEventListener('keydown', (e) => {
    if (inputLocked) return;
    if (e.code === 'ArrowLeft') {
      if (e.repeat) return;
      e.preventDefault();
      onStep('L');
    } else if (e.code === 'ArrowRight') {
      if (e.repeat) return;
      e.preventDefault();
      onStep('R');
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  makeWorld();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (!gameEnded) {
      if (waitBeforeCd < COUNTDOWN_PREWAIT_S) {
        waitBeforeCd += dt;
      } else {
        cdElapsed += dt;
        if (!gameStarted && cdElapsed >= COUNTDOWN_DIGIT_S * 3) {
          gameStarted = true;
          raceTimeLeft = RACE_LIMIT_S;
          v = 0;
          dist = 0;
          lateral = 0;
          dirA = 0;
          lastFoot = null;
          duckRoot.position.set(PLAYER_LANE_X, 0, 0);
          botV = 0;
          botDist = 0;
          botLateral = 0;
          botDirA = 0;
          botLastFoot = null;
          botRunPhase = 0;
          botAnim.phase = 0;
          botAnim.idleT = 0;
          botAnim.squashT = 0;
          botAnim.dipImpulse = 0;
          botAnim.wasContact = false;
          botRoot.position.set(BOT_LANE_X, 0, 0);
          botNextTapTime = performance.now() + BOT_BASE_INTERVAL;
          boostTimer = 0.3;
          updateHud();
        }
        if (gameStarted) {
          raceTimeLeft -= dt;
          if (raceTimeLeft <= 0) {
            raceTimeLeft = 0;
            gameEnded = true;
            inputLocked = true;
            v = 0;
            botV = 0;
            if (dist > botDist + 0.01) {
              finishOverlayMain = 'WIN!';
              finishColor = '#4CAF50';
            } else if (botDist > dist + 0.01) {
              finishOverlayMain = 'LOSE!';
              finishColor = '#f44336';
            } else {
              finishOverlayMain = 'DRAW!';
              finishColor = '#FFD700';
            }
            updateHud();
          }
        }
      }
    } else {
      v = 0;
      botV = 0;
    }

    countdownJogT = Math.max(0, countdownJogT - dt);

    if (gameStarted && !gameEnded) {
      v *= Math.pow(SLIDE_DECAY, 60 * dt);
      const drag = AIR_RESISTANCE * Math.abs(v) * v * dt;
      v -= drag;
      if (v < 0.01) v = 0;
      dist += v * Math.cos(dirA) * dt;
      lateral += v * Math.sin(dirA) * dt;
      duckRoot.position.z = -dist;
      duckRoot.position.x = lateral;
    }

    lastEffA = dirA;
    duckRoot.rotation.y = lastEffA + Math.PI;
    botRoot.rotation.y = duckRoot.rotation.y;

    const runningAnim =
      (gameStarted && !gameEnded && v >= IDLE_ENTER) ||
      (!gameStarted && !gameEnded && countdownJogT > 0);
    const idle = !runningAnim;

    if (idle) {
      run.idleT += dt;
    } else {
      run.idleT = 0;
    }

    const speedN = Math.min(1, v / MAX_SPEED);
    const cadence = 6 + speedN * 14;
    if (runningAnim) run.phase += dt * cadence;

    if (gameStarted && !gameEnded) updateHud();

    wobbleImpulse *= Math.pow(0.88, dt * 60);
    botWobbleImpulse *= Math.pow(0.88, dt * 60);

    // 스쿼시 복원 (탭 피드백)
    run.squashT = Math.max(0, run.squashT - dt * 5);
    const sq = run.squashT;
    const squashX = 1 + sq * 0.22;
    const squashY = 1 - sq * 0.28;
    const squashZ = 1 + sq * 0.12;
    bodySquashGroup.scale.set(squashX, squashY, squashZ);

    const ph = run.phase;
    const swing = (0.85 + speedN * 0.55);
    const thighAmp = 0.95 + speedN * 0.5;

    // 왼발 / 오른발 명확한 교대 (사인 위상 반대)
    const leftPhase = ph;
    const rightPhase = ph + Math.PI;
    legLU.rotation.x = Math.sin(leftPhase) * thighAmp;
    legLL.rotation.x = Math.max(0, -Math.sin(leftPhase + 0.4) * swing * 0.9);
    legRU.rotation.x = Math.sin(rightPhase) * thighAmp;
    legRL.rotation.x = Math.max(0, -Math.sin(rightPhase + 0.4) * swing * 0.9);

    // 뒤뚱 — 롤 + 무게 이동 (과장·빠를수록 격해짐)
    const waddleAmp = (0.12 + speedN * 0.38) * 1.85;
    const waddle = waddleAmp * Math.sin(ph) + wobbleImpulse;
    bodySquashGroup.rotation.z = waddle;
    bodySquashGroup.position.x = Math.sin(ph) * (0.07 + speedN * 0.22) * 1.85;

    // 앞으로 기울임
    const leanF = speedN * 0.38;
    bodySquashGroup.rotation.x = leanF + Math.sin(ph * 2) * 0.04 * speedN;

    // 닭 까딱 — 머리 피치·요 (더 과장)
    headGroup.rotation.x = Math.sin(ph * 2) * (0.18 + speedN * 0.2) * 2.0;
    headGroup.rotation.y = Math.sin(ph) * (0.08 + speedN * 0.06) * 2.0 * speedN;

    // 꼬리 좌우
    tailPivot.rotation.y = Math.sin(ph + 0.5) * (0.55 + speedN * 0.65);
    tailPivot.rotation.x = Math.sin(ph * 2) * 0.12 * speedN;

    // 착지 충격: |cos(2φ)| 최소 근처 = 좌·우 발 교대 접지 순간 (엣지에서 한 번만)
    const stepWave = Math.abs(Math.cos(ph * 2));
    const contact = stepWave < 0.11;
    if (contact && !run.wasContact) {
      run.dipImpulse = 0.16 + speedN * 0.12;
    }
    run.wasContact = contact;
    run.dipImpulse *= Math.pow(0.82, dt * 60);
    duckRoot.position.y =
      idle ? duckRoot.position.y * (1 - dt * 6) : -run.dipImpulse * 0.35;

    // 날개 — 느리면 붙음, 빠르면 살짝 벌림
    const wingOpen = speedN * 0.55;
    wingL.rotation.y = -0.15 - wingOpen * 0.35;
    wingR.rotation.y = 0.15 + wingOpen * 0.35;
    wingL.rotation.z = 0.25 + Math.sin(ph * 2) * 0.06 * speedN;
    wingR.rotation.z = -0.25 - Math.sin(ph * 2) * 0.06 * speedN;

    // Idle
    if (idle) {
      const id = run.idleT;
      headGroup.rotation.y = Math.sin(id * 1.1) * 0.35;
      headGroup.rotation.x = Math.sin(id * 0.7) * 0.06;
      bodySquashGroup.rotation.z = Math.sin(id * 0.9) * 0.06;
      bodySquashGroup.rotation.x = Math.sin(id * 0.5) * 0.03;
      legLU.rotation.x = Math.sin(id * 2.2) * 0.12;
      legRU.rotation.x = Math.sin(id * 2.2 + Math.PI) * 0.12;
      legLL.rotation.x = 0.05;
      legRL.rotation.x = 0.05;
      tailPivot.rotation.y = Math.sin(id * 1.3) * 0.15;
      wingL.rotation.y = -0.15;
      wingR.rotation.y = 0.15;
    }

    const botRunningAnim =
      gameStarted && !gameEnded && botV >= IDLE_ENTER;
    const botIdle = !botRunningAnim;

    if (botIdle) {
      botAnim.idleT += dt;
    } else {
      botAnim.idleT = 0;
    }

    const botSpeedN = Math.min(1, botV / MAX_SPEED);
    if (botRunningAnim) botRunPhase += botV * dt * 8;
    const bph = botRunPhase;
    const bswing = 0.85 + botSpeedN * 0.55;
    const bthigh = 0.95 + botSpeedN * 0.5;
    botAnim.squashT = Math.max(0, botAnim.squashT - dt * 5);
    const bsq = botAnim.squashT;
    const bsx = 1 + bsq * 0.22;
    const bsy = 1 - bsq * 0.28;
    const bsz = 1 + bsq * 0.12;
    botDuck.body.scale.set(bsx, bsy, bsz);
    if (botRunningAnim) {
      botDuck.leftLeg.hip.rotation.x = Math.sin(bph) * bthigh;
      botDuck.leftLeg.lower.rotation.x = Math.max(
        0,
        -Math.sin(bph + 0.4) * bswing * 0.9
      );
      botDuck.rightLeg.hip.rotation.x = Math.sin(bph + Math.PI) * bthigh;
      botDuck.rightLeg.lower.rotation.x = Math.max(
        0,
        -Math.sin(bph + Math.PI + 0.4) * bswing * 0.9
      );
      const bwad = (0.12 + botSpeedN * 0.38) * 1.85;
      const bwaddle = bwad * Math.sin(bph) + botWobbleImpulse;
      botDuck.body.rotation.z = bwaddle;
      botDuck.body.position.x = Math.sin(bph) * (0.07 + botSpeedN * 0.22) * 1.85;
      const blev = botSpeedN * 0.38;
      botDuck.body.rotation.x =
        blev + Math.sin(bph * 2) * 0.04 * botSpeedN;
      botDuck.head.rotation.x =
        Math.sin(bph * 2) * (0.18 + botSpeedN * 0.2) * 2.0;
      botDuck.head.rotation.y =
        Math.sin(bph) * (0.08 + botSpeedN * 0.06) * 2.0 * botSpeedN;
      botDuck.tail.rotation.y = Math.sin(bph + 0.5) * (0.55 + botSpeedN * 0.65);
      botDuck.tail.rotation.x = Math.sin(bph * 2) * 0.12 * botSpeedN;
      const bwingO = botSpeedN * 0.55;
      botDuck.leftWing.rotation.y = -0.15 - bwingO * 0.35;
      botDuck.rightWing.rotation.y = 0.15 + bwingO * 0.35;
      botDuck.leftWing.rotation.z =
        0.25 + Math.sin(bph * 2) * 0.06 * botSpeedN;
      botDuck.rightWing.rotation.z =
        -0.25 - Math.sin(bph * 2) * 0.06 * botSpeedN;
      const bstepWave = Math.abs(Math.cos(bph * 2));
      const bcontact = bstepWave < 0.11;
      if (bcontact && !botAnim.wasContact) {
        botAnim.dipImpulse = 0.16 + botSpeedN * 0.12;
      }
      botAnim.wasContact = bcontact;
      botAnim.dipImpulse *= Math.pow(0.82, dt * 60);
      botRoot.position.y = -botAnim.dipImpulse * 0.35;
    } else {
      const bid = botAnim.idleT;
      botDuck.head.rotation.y = Math.sin(bid * 1.1) * 0.35;
      botDuck.head.rotation.x = Math.sin(bid * 0.7) * 0.06;
      botDuck.body.rotation.z = Math.sin(bid * 0.9) * 0.06;
      botDuck.body.rotation.x = Math.sin(bid * 0.5) * 0.03;
      botDuck.leftLeg.hip.rotation.x = Math.sin(bid * 2.2) * 0.12;
      botDuck.rightLeg.hip.rotation.x = Math.sin(bid * 2.2 + Math.PI) * 0.12;
      botDuck.leftLeg.lower.rotation.x = 0.05;
      botDuck.rightLeg.lower.rotation.x = 0.05;
      botDuck.tail.rotation.y = Math.sin(bid * 1.3) * 0.15;
      botDuck.leftWing.rotation.y = -0.15;
      botDuck.rightWing.rotation.y = 0.15;
      botRoot.position.y = botRoot.position.y * (1 - dt * 6);
    }

    const midDist = dist * 0.6 + botDist * 0.4;
    const camTargetPos = new THREE.Vector3(0, 1.5, -midDist);
    const camDesired = new THREE.Vector3(0, 4.5, -midDist + 8);
    camera.position.lerp(camDesired, 0.05);
    camera.lookAt(camTargetPos);

    if (boostTimer > 0) {
      boostTimer -= dt;
      const t = Math.max(0, boostTimer) / 0.3;
      camera.fov = 55 + 10 * Math.sin(t * Math.PI);
      camera.updateProjectionMatrix();
    } else {
      camera.fov = BASE_CAMERA_FOV;
      camera.updateProjectionMatrix();
    }

    updateCdOverlay();

    renderer.render(scene, camera);
  }

  animate();
  })();
  </script>
</body>
</html>
