<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MADUCK Run — Three.js 프로토타입 (달려오리)</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #87c5ff; font-family: system-ui, sans-serif; }
    #hint {
      position: fixed; left: 12px; bottom: 12px; right: 12px;
      padding: 10px 14px; background: rgba(0,0,0,.55); color: #fff;
      font-size: 13px; line-height: 1.45; border-radius: 10px; z-index: 10; pointer-events: none;
    }
    #hint kbd { background: #333; padding: 2px 6px; border-radius: 4px; }
    #hud {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; background: rgba(0,0,0,.6); color: #fff;
      font-size: 18px; font-weight: 700; border-radius: 10px; z-index: 12; pointer-events: none;
      text-align: center; min-width: 200px;
    }
    #hud .sub { font-size: 13px; font-weight: 500; opacity: .85; margin-top: 4px; }
    #cdOverlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 20; font-size: min(22vw, 120px); font-weight: 900;
      color: #fff; text-shadow: 0 4px 24px rgba(0,0,0,.5); letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div id="cdOverlay" aria-hidden="true"></div>
  <div id="hud" aria-live="polite">
    <span id="hudTime">13.0</span>초
    <div class="sub" id="hudSub"></div>
  </div>
  <div id="hint">
    ←왼발 →오른발 교대로 눌러서 달리기 | 13초 제한
  </div>
  <!-- file:// 더블클릭 동작: three r128 (cdnjs), OrbitControls 미사용 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
  var THREE = window.THREE;

  /** dallyeori-server/src/game/physics.js + src/constants.js RACE_ENGINE_PHYSICS 미러 (normal 지형) */
  const PH = {
    DUCK_MASS: 3.5,
    TAP_FORCE: 1.8,
    MAX_SPEED: 4.5,
    AIR_RESISTANCE: 0.02,
    SAME_FOOT_ANGLE: 0.18,
    ANGLE_RECOVERY: 0.18,
    STUMBLE_THRESHOLD: 2.2,
    STUMBLE_GAP: 0.42,
    STUMBLE_DECEL_PER_S: 5.5,
    TERRAIN_NORMAL: { friction: 0.85, slideDecay: 0.95 },
  };
  const RACE_LIMIT_S = 13;
  const COUNTDOWN_SEC = 3;
  const GO_HOLD_SEC = 0.65;
  const DIR_A_LIMIT = 1.57;
  const IDLE_ENTER = 0.15;
  /** 월드 고정 트랙 Z방향 길이(m) — 오리만 이동, 경기장은 절대 따라가지 않음 */
  const TRACK_WORLD_LEN = 400;

  let renderer, scene, camera;
  let duckRoot, bodySquashGroup, torsoMesh, headGroup, tailPivot, wingL, wingR;
  let legLU, legLL, footL, legRU, legRL, footR;
  let ground, trackMesh, decorGroup, laneLineL, laneLineR, trackStripeTex, distMarkersGroup;
  const hudTimeEl = typeof document !== 'undefined' ? document.getElementById('hudTime') : null;
  const hudSubEl = typeof document !== 'undefined' ? document.getElementById('hudSub') : null;
  const cdOverlayEl = typeof document !== 'undefined' ? document.getElementById('cdOverlay') : null;

  const clock = new THREE.Clock();

  /** 애니메이션 전용 (물리 속도와 분리) */
  const run = {
    phase: 0,
    idleT: 0,
    lastTapT: -999,
    squashT: 0,
    dipImpulse: 0,
    wasContact: false,
  };

  /** 서버 stepDuck / applyTap 대응 상태 */
  const duckPhys = {
    v: 0,
    dirA: 0,
    spinAngle: 0,
    stumble: 0,
    lastTapRaceT: 0,
  };
  let raceT = 0;
  /** step 직후 렌더용 */
  let lastEffA = 0;

  let distanceM = 0;
  let lastFoot = null;
  /** @type {'countdown' | 'racing' | 'done'} */
  let racePhase = 'countdown';
  let raceTimeLeft = RACE_LIMIT_S;
  let countdownElapsed = 0;
  /** 카운트다운 중 탭 시 제자리뛰기 애니 길이 */
  let countdownJogT = 0;

  function clayMat(hex, r = 0.88, m = 0.04) {
    return new THREE.MeshStandardMaterial({
      color: hex, roughness: r, metalness: m,
    });
  }

  function moveTowardVal(current, target, maxStep) {
    if (current === target) return target;
    const d = target - current;
    if (Math.abs(d) <= maxStep) return target;
    return current + Math.sign(d) * maxStep;
  }

  /** 트랙 진행 방향(Z)으로 0.5m 간격 줄무늬 */
  function makeTrackStripeTexture() {
    const c = document.createElement('canvas');
    c.width = 4;
    c.height = 32;
    const cx = c.getContext('2d');
    const h = 16;
    cx.fillStyle = '#4e3828';
    cx.fillRect(0, 0, 4, h);
    cx.fillStyle = '#6d4c41';
    cx.fillRect(0, h, 4, h);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 4;
    tex.repeat.set(1, TRACK_WORLD_LEN / 0.5);
    return tex;
  }

  function makeDuck() {
    const black = clayMat(0x1c1c1e);
    const orange = clayMat(0xff6a2d, 0.82);
    const white = clayMat(0xf5f5f5, 0.9);
    const pupil = clayMat(0x0a0a0a, 0.75);

    duckRoot = new THREE.Group();
    duckRoot.position.set(0, 0, 0);

    bodySquashGroup = new THREE.Group();
    duckRoot.add(bodySquashGroup);

    // 뚱뚱한 알통 — 세그먼트 많이 + 약간 늘린 구체 (클레이 둥글림)
    const bodyGeo = new THREE.SphereGeometry(0.52, 48, 40);
    bodyGeo.scale(1.05, 1.18, 0.92);
    torsoMesh = new THREE.Mesh(bodyGeo, black);
    torsoMesh.position.y = 0.62;
    torsoMesh.castShadow = true;
    bodySquashGroup.add(torsoMesh);

    // 목 밴드 (뚱한 토러스)
    const collar = new THREE.Mesh(
      new THREE.TorusGeometry(0.38, 0.09, 16, 48),
      orange
    );
    collar.rotation.x = Math.PI / 2;
    collar.position.set(0, 1.12, 0);
    collar.castShadow = true;
    bodySquashGroup.add(collar);

    // 밴드 앞쪽 흰 O 느낌
    const logo = new THREE.Mesh(new THREE.TorusGeometry(0.055, 0.018, 12, 24), white);
    logo.position.set(0, 1.12, 0.36);
    logo.rotation.y = 0;
    bodySquashGroup.add(logo);

    headGroup = new THREE.Group();
    headGroup.position.set(0, 1.38, 0.06);
    bodySquashGroup.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.44, 40, 32), black);
    head.castShadow = true;
    headGroup.add(head);

    // 머리털 3개
    for (let i = -1; i <= 1; i++) {
      const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 10), black);
      tuft.position.set(i * 0.12, 0.46, -0.02);
      tuft.scale.set(0.7, 1.15, 0.65);
      headGroup.add(tuft);
    }

    // 화난 눈썹 (r128에는 CapsuleGeometry 없음 → 동일 실루엣에 가깝게 원통)
    const browGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.22, 8, 1);
    const browL = new THREE.Mesh(browGeo, black);
    browL.rotation.z = 0.55;
    browL.rotation.x = 0.2;
    browL.position.set(-0.16, 0.08, 0.38);
    headGroup.add(browL);
    const browR = new THREE.Mesh(browGeo, black);
    browR.rotation.z = -0.55;
    browR.rotation.x = 0.2;
    browR.position.set(0.16, 0.08, 0.38);
    headGroup.add(browR);

    // 눈
    const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.11, 16, 12), white);
    eyeWhite.position.set(-0.17, 0.02, 0.39);
    headGroup.add(eyeWhite);
    const eyeWhite2 = eyeWhite.clone();
    eyeWhite2.position.x = 0.17;
    headGroup.add(eyeWhite2);
    const pup = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), pupil);
    pup.position.set(-0.15, 0.02, 0.47);
    headGroup.add(pup);
    const pup2 = pup.clone();
    pup2.position.set(0.19, 0.02, 0.47);
    headGroup.add(pup2);

    // 부리 — 납작한 캡슐 느낌
    const beak = new THREE.Mesh(new THREE.SphereGeometry(0.16, 20, 16), orange);
    beak.scale.set(1.35, 0.65, 0.85);
    beak.position.set(0, -0.06, 0.48);
    headGroup.add(beak);

    // 날개 (몸에 붙음)
    const wingGeo = new THREE.SphereGeometry(0.22, 16, 12);
    wingGeo.scale(0.35, 0.75, 1);
    wingL = new THREE.Mesh(wingGeo, black);
    wingL.position.set(-0.52, 0.75, -0.02);
    wingL.rotation.z = 0.25;
    wingL.rotation.y = -0.15;
    wingL.castShadow = true;
    bodySquashGroup.add(wingL);
    wingR = wingL.clone();
    wingR.position.x = 0.52;
    wingR.rotation.z = -0.25;
    wingR.rotation.y = 0.15;
    bodySquashGroup.add(wingR);

    // 꼬리 — 엉덩이 흔들림용 피벗
    tailPivot = new THREE.Group();
    tailPivot.position.set(0, 0.72, -0.48);
    bodySquashGroup.add(tailPivot);
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.28, 12), black);
    tail.rotation.x = -Math.PI / 2 + 0.35;
    tail.position.set(0, 0.05, -0.12);
    tail.castShadow = true;
    tailPivot.add(tail);

    function makeLeg(side) {
      const hip = new THREE.Group();
      hip.position.set(side * 0.22, 0.38, 0);
      bodySquashGroup.add(hip);

      const upper = new THREE.Mesh(
        new THREE.CylinderGeometry(0.11, 0.11, 0.24, 12, 1),
        orange
      );
      upper.position.y = -0.12;
      upper.castShadow = true;
      hip.add(upper);

      const lower = new THREE.Group();
      lower.position.y = -0.22;
      hip.add(lower);

      const shin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.09, 0.18, 10, 1),
        orange
      );
      shin.position.y = -0.1;
      shin.castShadow = true;
      lower.add(shin);

      const foot = new THREE.Mesh(new THREE.SphereGeometry(0.16, 14, 10), orange);
      foot.scale.set(1.5, 0.35, 2.1);
      foot.position.y = -0.22;
      foot.castShadow = true;
      lower.add(foot);

      return { hip, upper, lower, footMesh: foot };
    }

    const L = makeLeg(-1);
    const R = makeLeg(1);
    legLU = L.hip; legLL = L.lower; footL = L.footMesh;
    legRU = R.hip; legRL = R.lower; footR = R.footMesh;

    return duckRoot;
  }

  function makeWorld() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c5ff);
    scene.fog = new THREE.Fog(0xa8dcff, 15, 120);

    camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 650);
    camera.position.set(0, 2.2, 5.2);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xfff5e6, 0x3d5c3a, 0.85);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.05);
    sun.position.set(4, 14, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 220;
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 200;
    sun.shadow.camera.bottom = -200;
    scene.add(sun);

    // 잔디 — 월드 고정 (오리/카메라만 이동)
    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(420, TRACK_WORLD_LEN + 40, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x4caf6a, roughness: 0.95, metalness: 0 })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.position.y = 0;
    grass.receiveShadow = true;
    scene.add(grass);
    ground = grass;

    // 트랙 레인 — 0.5m 줄무늬, 월드 좌표 고정
    trackStripeTex = makeTrackStripeTexture();
    trackMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(3.2, TRACK_WORLD_LEN, 1, 1),
      new THREE.MeshStandardMaterial({
        map: trackStripeTex,
        color: 0xffffff,
        roughness: 0.88,
        metalness: 0.02,
      })
    );
    trackMesh.rotation.x = -Math.PI / 2;
    trackMesh.position.y = 0.01;
    trackMesh.receiveShadow = true;
    scene.add(trackMesh);

    // 레인 라인 — 월드 고정
    laneLineL = new THREE.Mesh(
      new THREE.PlaneGeometry(0.08, TRACK_WORLD_LEN),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 })
    );
    laneLineL.rotation.x = -Math.PI / 2;
    laneLineL.position.set(-1.45, 0.02, 0);
    scene.add(laneLineL);
    laneLineR = laneLineL.clone();
    laneLineR.position.set(1.45, 0.02, 0);
    scene.add(laneLineR);

    // 트랙 양옆 1m 간격 거리 마커(작은 말뚝) — 월드 고정
    distMarkersGroup = new THREE.Group();
    const poleMat = clayMat(0xeceff1, 0.75);
    const capMat = clayMat(0xffb300, 0.7);
    const markHalf = Math.floor(TRACK_WORLD_LEN / 2);
    for (let i = -markHalf; i <= markHalf; i++) {
      if (i === 0) continue;
      const z = i * 1.0;
      const poleGeo = new THREE.CylinderGeometry(0.04, 0.055, 0.32, 6);
      const poleL = new THREE.Mesh(poleGeo, poleMat);
      poleL.position.set(-1.74, 0.16, z);
      poleL.castShadow = true;
      distMarkersGroup.add(poleL);
      const capL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), capMat);
      capL.position.set(-1.74, 0.34, z);
      distMarkersGroup.add(capL);
      const poleR = poleL.clone();
      poleR.position.x = 1.74;
      const capR = capL.clone();
      capR.position.x = 1.74;
      distMarkersGroup.add(poleR);
      distMarkersGroup.add(capR);
    }

    scene.add(distMarkersGroup);
    decorGroup = new THREE.Group();
    scene.add(decorGroup);
    const trunkMat = clayMat(0x5d4037);
    const leafMat = clayMat(0x2e7d32, 0.9);
    for (let i = -70; i <= 70; i++) {
      if (i === 0) continue;
      const z = i * 2.8 - 1.4;
      const side = i % 2 === 0 ? -1 : 1;
      const tx = side * (4.8 + (Math.abs(i) % 3) * 0.45);
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 1.0, 8), trunkMat);
      trunk.position.set(tx, 0.5, z);
      trunk.castShadow = true;
      decorGroup.add(trunk);
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 8), leafMat);
      leaf.position.set(tx, 1.15, z);
      leaf.scale.y = 0.85;
      leaf.castShadow = true;
      decorGroup.add(leaf);
    }

    scene.add(makeDuck());
    updateHud();
  }

  function updateHud() {
    if (!hudTimeEl || !hudSubEl) return;
    if (racePhase === 'countdown') {
      hudTimeEl.textContent = String(RACE_LIMIT_S.toFixed(1));
      hudSubEl.textContent = '곧 출발… 제자리에서 발 까딱 연습 OK';
      return;
    }
    if (racePhase === 'racing') {
      hudTimeEl.textContent = Math.max(0, raceTimeLeft).toFixed(1);
      hudSubEl.textContent = distanceM.toFixed(1) + ' m';
      return;
    }
    hudTimeEl.textContent = '0.0';
    hudSubEl.textContent = '종료! 달린 거리 — ' + distanceM.toFixed(2) + ' m';
  }

  function updateCountdownOverlay() {
    if (!cdOverlayEl) return;
    if (racePhase !== 'countdown') {
      cdOverlayEl.textContent = '';
      return;
    }
    const t = countdownElapsed;
    if (t < 1) cdOverlayEl.textContent = '3';
    else if (t < 2) cdOverlayEl.textContent = '2';
    else if (t < 3) cdOverlayEl.textContent = '1';
    else if (t < COUNTDOWN_SEC + GO_HOLD_SEC) cdOverlayEl.textContent = '출발!';
    else cdOverlayEl.textContent = '';
  }

  function applyTapPhysics(foot) {
    const terr = PH.TERRAIN_NORMAL;
    let imp = (PH.TAP_FORCE / PH.DUCK_MASS) * terr.friction;
    if (duckPhys.stumble) imp *= 0.45;
    const sameFoot = lastFoot === foot;
    if (sameFoot) {
      if (foot === 'L') duckPhys.dirA -= PH.SAME_FOOT_ANGLE;
      else duckPhys.dirA += PH.SAME_FOOT_ANGLE;
      duckPhys.v += imp * 0.38;
    } else {
      duckPhys.v += imp;
      const r = PH.ANGLE_RECOVERY;
      if (duckPhys.dirA > r) duckPhys.dirA -= r;
      else if (duckPhys.dirA < -r) duckPhys.dirA += r;
      else duckPhys.dirA = 0;
    }
    duckPhys.v = Math.max(0, Math.min(PH.MAX_SPEED, duckPhys.v));
    duckPhys.dirA = Math.max(-DIR_A_LIMIT, Math.min(DIR_A_LIMIT, duckPhys.dirA));
    duckPhys.spinAngle = Math.max(-DIR_A_LIMIT, Math.min(DIR_A_LIMIT, duckPhys.spinAngle));
    lastFoot = foot;
    duckPhys.lastTapRaceT = raceT;
    duckPhys.stumble = 0;
  }

  /**
   * @param {'L'|'R'} foot
   */
  function footTap(foot) {
    if (racePhase === 'done') return;

    if (racePhase === 'countdown') {
      run.squashT = 1;
      run.phase += Math.PI * 0.5;
      countdownJogT = 0.38;
      return;
    }

    if (racePhase === 'racing') {
      applyTapPhysics(foot);
      run.squashT = 1;
      run.phase += Math.PI * 0.5;
    }
  }

  window.addEventListener('pointerdown', (e) => {
    if (racePhase === 'done') return;
    const x = e.clientX;
    if (x < window.innerWidth * 0.5) footTap('L');
    else footTap('R');
  });
  window.addEventListener('keydown', (e) => {
    if (racePhase === 'done') return;
    if (e.code === 'ArrowLeft') {
      if (e.repeat) return;
      e.preventDefault();
      footTap('L');
    } else if (e.code === 'ArrowRight') {
      if (e.repeat) return;
      e.preventDefault();
      footTap('R');
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  makeWorld();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (racePhase === 'countdown') {
      countdownElapsed += dt;
      const cdEnd = COUNTDOWN_SEC + GO_HOLD_SEC;
      if (countdownElapsed >= cdEnd) {
        racePhase = 'racing';
        raceTimeLeft = RACE_LIMIT_S;
        raceT = 0;
        distanceM = 0;
        duckPhys.v = 0;
        duckPhys.dirA = 0;
        duckPhys.spinAngle = 0;
        duckPhys.stumble = 0;
        duckPhys.lastTapRaceT = 0;
        lastFoot = null;
        countdownJogT = 0;
        duckRoot.position.set(0, 0, 0);
        updateHud();
      }
      updateCountdownOverlay();
    }

    if (racePhase === 'racing') {
      raceTimeLeft -= dt;
      if (raceTimeLeft <= 0) {
        raceTimeLeft = 0;
        racePhase = 'done';
        duckPhys.v = 0;
        duckPhys.stumble = 0;
        updateHud();
        if (cdOverlayEl) cdOverlayEl.textContent = '';
      }
    }

    if (racePhase === 'done') {
      duckPhys.v = 0;
    }

    countdownJogT = Math.max(0, countdownJogT - dt);

    const terr = PH.TERRAIN_NORMAL;
    if (racePhase === 'racing') {
      raceT += dt;
      const spinRec = 0.06;
      duckPhys.spinAngle = moveTowardVal(duckPhys.spinAngle, 0, spinRec * dt * 8);
      lastEffA = duckPhys.dirA + 0.45 * duckPhys.spinAngle * Math.sin(raceT * 3);
      const prevV = duckPhys.v;
      const dt60 = 60 * dt;
      duckPhys.v *= Math.pow(terr.slideDecay, dt60);
      const drag = PH.AIR_RESISTANCE * Math.abs(duckPhys.v) * duckPhys.v * dt;
      if (duckPhys.v > 0) duckPhys.v = Math.max(0, duckPhys.v - drag);
      if (duckPhys.stumble) {
        duckPhys.v = Math.max(0, duckPhys.v - PH.STUMBLE_DECEL_PER_S * dt);
        if (duckPhys.v < 0.18) duckPhys.stumble = 0;
      } else {
        const gap = raceT - duckPhys.lastTapRaceT;
        if (prevV > PH.STUMBLE_THRESHOLD && gap > PH.STUMBLE_GAP) duckPhys.stumble = 1;
      }
      duckPhys.v = Math.max(0, Math.min(PH.MAX_SPEED, duckPhys.v));
      const fwd = duckPhys.v * Math.cos(lastEffA) * dt;
      const lat = duckPhys.v * Math.sin(lastEffA) * dt;
      distanceM += fwd;
      duckRoot.position.x += lat;
      duckRoot.position.z += -fwd;
    } else {
      lastEffA = duckPhys.dirA;
    }

    duckRoot.rotation.y = lastEffA + Math.PI;

    const runningAnim =
      (racePhase === 'racing' && duckPhys.v >= IDLE_ENTER) ||
      countdownJogT > 0;
    const idle = !runningAnim;

    if (idle) {
      run.idleT += dt;
    } else {
      run.idleT = 0;
    }

    const speedN = Math.min(1, duckPhys.v / PH.MAX_SPEED);
    const cadence = 6 + speedN * 14;
    if (runningAnim) run.phase += dt * cadence;

    if (racePhase === 'racing') updateHud();

    // 스쿼시 복원 (탭 피드백)
    run.squashT = Math.max(0, run.squashT - dt * 5);
    const sq = run.squashT;
    const squashX = 1 + sq * 0.22;
    const squashY = 1 - sq * 0.28;
    const squashZ = 1 + sq * 0.12;
    bodySquashGroup.scale.set(squashX, squashY, squashZ);

    const ph = run.phase;
    const swing = (0.85 + speedN * 0.55);
    const thighAmp = 0.95 + speedN * 0.5;

    // 왼발 / 오른발 명확한 교대 (사인 위상 반대)
    const leftPhase = ph;
    const rightPhase = ph + Math.PI;
    legLU.rotation.x = Math.sin(leftPhase) * thighAmp;
    legLL.rotation.x = Math.max(0, -Math.sin(leftPhase + 0.4) * swing * 0.9);
    legRU.rotation.x = Math.sin(rightPhase) * thighAmp;
    legRL.rotation.x = Math.max(0, -Math.sin(rightPhase + 0.4) * swing * 0.9);

    // 뒤뚱 — 롤 + 무게 이동 (빠를수록)
    const waddle = (0.12 + speedN * 0.22) * Math.sin(ph);
    bodySquashGroup.rotation.z = waddle;
    bodySquashGroup.position.x = Math.sin(ph) * (0.04 + speedN * 0.1);

    // 앞으로 기울임
    const leanF = speedN * 0.38;
    bodySquashGroup.rotation.x = leanF + Math.sin(ph * 2) * 0.04 * speedN;

    // 닭 까딱 — 머리 피치
    headGroup.rotation.x = Math.sin(ph * 2) * (0.18 + speedN * 0.2);
    headGroup.rotation.y = Math.sin(ph) * 0.08 * speedN;

    // 꼬리 좌우
    tailPivot.rotation.y = Math.sin(ph + 0.5) * (0.55 + speedN * 0.65);
    tailPivot.rotation.x = Math.sin(ph * 2) * 0.12 * speedN;

    // 착지 충격: |cos(2φ)| 최소 근처 = 좌·우 발 교대 접지 순간 (엣지에서 한 번만)
    const stepWave = Math.abs(Math.cos(ph * 2));
    const contact = stepWave < 0.11;
    if (contact && !run.wasContact) {
      run.dipImpulse = 0.16 + speedN * 0.12;
    }
    run.wasContact = contact;
    run.dipImpulse *= Math.pow(0.82, dt * 60);
    duckRoot.position.y =
      idle ? duckRoot.position.y * (1 - dt * 6) : -run.dipImpulse * 0.35;

    // 날개 — 느리면 붙음, 빠르면 살짝 벌림
    const wingOpen = speedN * 0.55;
    wingL.rotation.y = -0.15 - wingOpen * 0.35;
    wingR.rotation.y = 0.15 + wingOpen * 0.35;
    wingL.rotation.z = 0.25 + Math.sin(ph * 2) * 0.06 * speedN;
    wingR.rotation.z = -0.25 - Math.sin(ph * 2) * 0.06 * speedN;

    // Idle
    if (idle) {
      const id = run.idleT;
      headGroup.rotation.y = Math.sin(id * 1.1) * 0.35;
      headGroup.rotation.x = Math.sin(id * 0.7) * 0.06;
      bodySquashGroup.rotation.z = Math.sin(id * 0.9) * 0.06;
      bodySquashGroup.rotation.x = Math.sin(id * 0.5) * 0.03;
      legLU.rotation.x = Math.sin(id * 2.2) * 0.12;
      legRU.rotation.x = Math.sin(id * 2.2 + Math.PI) * 0.12;
      legLL.rotation.x = 0.05;
      legRL.rotation.x = 0.05;
      tailPivot.rotation.y = Math.sin(id * 1.3) * 0.15;
      wingL.rotation.y = -0.15;
      wingR.rotation.y = 0.15;
    }

    // 고정 추적 카메라: 오리 뒤·위, 궁둥이 중심 룩앳 (Orbit 없음)
    const duckPx = duckRoot.position.x;
    const duckPy = duckRoot.position.y;
    const duckPz = duckRoot.position.z;
    const fx = Math.sin(lastEffA);
    const fz = -Math.cos(lastEffA);
    const targetDist = 4.8 + speedN * 2.4;
    const targetH = 1.55 + speedN * 0.32;
    const bx = duckPx - fx * targetDist;
    const bz = duckPz - fz * targetDist;
    const camLerp = 1 - Math.pow(0.88, dt * 60);
    camera.position.x += (bx - camera.position.x) * camLerp;
    camera.position.z += (bz - camera.position.z) * camLerp;
    camera.position.y += (duckPy + targetH - camera.position.y) * (1 - Math.pow(0.9, dt * 60));
    const lookY = duckPy + 0.72;
    camera.lookAt(duckPx, lookY, duckPz);

    renderer.render(scene, camera);
  }

  animate();
  })();
  </script>
</body>
</html>
