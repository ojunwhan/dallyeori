<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>달려오리 DALLYEORI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="g"></canvas>
<script>
'use strict';
const C=document.getElementById('g'),X=C.getContext('2d');

// ═══ DESIGN ═══
const W=360,H=640;
const TRACK_M=70,TIME_LIMIT=13;
const TAP_STRIDE=0.55,SAME_FOOT_MUL=0.45,FRICTION=0.93;

// ═══ CAMERA ═══
const VY=H*0.50,TB=H*0.78,VHW=W*0.05;
const TL0=W*0.02,TR0=W*0.98;
const DUCK_Y=H*0.64,DUCK_SZ=W*0.22;

// ═══ SCALE ═══
let sc=1,ox=0,oy=0;
function resize(){
  const w=innerWidth,h=innerHeight;
  sc=Math.min(w/W,h/H);
  C.width=W*sc;C.height=H*sc;
  ox=(w-C.width)/2;oy=(h-C.height)/2;
  C.style.cssText=`position:absolute;left:${ox}px;top:${oy}px`;
}
resize();addEventListener('resize',resize);

// ═══ SPRITES ═══
const sprites={};
let spritesLoaded=0;
function loadSprite(name,src){
  const img=new Image();
  img.onload=()=>{sprites[name]=img;spritesLoaded++};
  img.src=src;
}
loadSprite('body','../assets/sprites/ari_body.png');
loadSprite('head','../assets/sprites/ari_head.png');
loadSprite('leg','../assets/sprites/ari_leg.png');

// ═══ AUDIO ═══
let ac=null;
function ensureAudio(){
  if(!ac)try{ac=new(AudioContext||webkitAudioContext)}catch(e){}
  if(ac&&ac.state==='suspended')ac.resume();
}
function playSlap(){
  if(!ac)return;
  const t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(100+Math.random()*60,t);
  o.frequency.exponentialRampToValueAtTime(50,t+.07);
  g.gain.setValueAtTime(.3,t);
  g.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.connect(g);g.connect(ac.destination);
  o.start(t);o.stop(t+.09);
}

// ═══ STATE ═══
let state='ready',cdVal=3,cdT=0,raceT=0,winner=null,endT=0;

// ═══ PLAYERS ═══
function mkPlayer(isCpu){return{
  dist:0,spd:0,taps:0,lastFoot:null,isCpu,
  wc:0,wcTarget:0,tilt:0,bounceY:0,scX:1,scY:1,
  headLag:0,tailLag:0,lean:0,dirAngle:0,
  tapInterval:.2,tapTimer:0,cpuMul:.85+Math.random()*.3
}}
let P=mkPlayer(false),CPU=mkPlayer(true);

// ═══ BACKGROUND DATA ═══
const flowers=[];
for(let i=0;i<60;i++)flowers.push({
  side:Math.random()<.5?-1:1,
  along:Math.random()*100,
  offset:.1+Math.random()*.25,
  color:['#FF6B6B','#FFD93D','#FF69B4','#9B59B6','#FFA726'][Math.floor(Math.random()*5)],
  size:2+Math.random()*3
});
const stones=[];
for(let i=0;i<20;i++)stones.push({
  side:Math.random()<.5?-1:1,
  along:Math.random()*100,
  offset:Math.random()*.08,
  w:4+Math.random()*6,h:2+Math.random()*3
});
const spectators=[];
for(let i=0;i<80;i++)spectators.push({
  side:Math.random()<.5?-1:1,
  along:Math.random()*100,
  row:Math.floor(Math.random()*3),
  bobPhase:Math.random()*Math.PI*2,
  bobSpeed:.5+Math.random()*2
});
const flags=[];
for(let i=0;i<12;i++)flags.push({
  side:i%2===0?-1:1,
  along:i*8+4,
  color:i%3===0?'#D32F2F':i%3===1?'#1565C0':'#43A047'
});

// ═══ FLOW ACCUMULATOR ═══
let flowAcc=0;

// ═══ INPUT ═══
function tap(foot){
  if(state!=='racing')return;
  const p=P;
  if(p.lastFoot===foot){
    p.dirAngle+=(foot==='L'?-.7:.7);
    p.spd*=SAME_FOOT_MUL;
  }else{
    p.spd+=TAP_STRIDE;
    p.dirAngle*=.5;
  }
  p.dirAngle=Math.max(-1.57,Math.min(1.57,p.dirAngle));
  p.lastFoot=foot;p.taps++;
  p.wcTarget+=Math.PI;
  playSlap();
  if(navigator.vibrate)navigator.vibrate(15);
}

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='result'){reset();return}
  if(state==='ready'){startCD();return}
  for(let t of e.changedTouches){
    const x=(t.clientX-ox)/sc;
    tap(x<W/2?'L':'R');
  }
},{passive:false});
document.addEventListener('keydown',e=>{
  if(state==='result'){reset();return}
  if(state==='ready'){startCD();return}
  if(e.key==='ArrowLeft')tap('L');
  if(e.key==='ArrowRight')tap('R');
});
C.addEventListener('mousedown',e=>{
  if(state==='result'){reset();return}
  if(state==='ready'){startCD();return}
  const x=(e.clientX-ox)/sc;
  tap(x<W/2?'L':'R');
});

function startCD(){ensureAudio();state='countdown';cdVal=3;cdT=0}
function reset(){
  P=mkPlayer(false);CPU=mkPlayer(true);
  raceT=0;winner=null;endT=0;flowAcc=0;state='ready';
}

// ═══ TRACK HELPERS ═══
function trackX(t,frac){
  const l=(W/2-VHW)*(1-t)+TL0*t;
  const r=(W/2+VHW)*(1-t)+TR0*t;
  return l+frac*(r-l);
}

// ═══ UPDATE ═══
function update(dt){
  if(state==='countdown'){
    cdT+=dt;if(cdT>=1){cdT=0;cdVal--;if(cdVal<0)state='racing';}
    return;
  }
  if(state==='racing'){
    raceT+=dt;
    // Player
    updateDuck(P,dt);
    // CPU AI
    CPU.tapTimer+=dt;
    if(CPU.tapTimer>=CPU.tapInterval){
      CPU.tapTimer=0;
      CPU.tapInterval=.14+Math.random()*.06;
      CPU.spd+=TAP_STRIDE*CPU.cpuMul;
      if(Math.random()<.08){CPU.spd*=SAME_FOOT_MUL;}// mistake
      CPU.wcTarget+=Math.PI;
      CPU.lastFoot=CPU.lastFoot==='L'?'R':'L';
    }
    updateDuck(CPU,dt);
    // Flow
    const avg=(P.spd+CPU.spd)/2;
    flowAcc+=avg*55*dt;
    // End check
    if(P.dist>=TRACK_M||CPU.dist>=TRACK_M||raceT>=TIME_LIMIT){
      winner=P.dist>=CPU.dist?'YOU':'CPU';
      state='ending';endT=0;
    }
  }
  if(state==='ending'){
    endT+=dt;
    P.spd*=.92;CPU.spd*=.92;
    P.dist+=P.spd*dt;CPU.dist+=CPU.spd*dt;
    updateAnim(P,dt);updateAnim(CPU,dt);
    if(endT>2.5)state='result';
  }
}

function updateDuck(p,dt){
  p.dist+=p.spd*dt;
  p.spd*=FRICTION;
  updateAnim(p,dt);
}

function updateAnim(p,dt){
  // Advance walk cycle
  const rate=Math.min(25,5+p.spd*8);
  if(p.wc<p.wcTarget){
    p.wc+=rate*dt;
    if(p.wc>p.wcTarget)p.wc=p.wcTarget;
  }
  const sin=Math.sin(p.wc),absSin=Math.abs(sin);
  const sMul=Math.min(p.spd/3,1.5);
  
  // Tilt (±0.4 rad ≈ 23°)
  p.tilt=sin*0.4*sMul;
  // Bounce
  p.bounceY=-absSin*14*sMul;
  // Squash/Stretch
  const sq=0.14*sMul;
  p.scX=1+(1-absSin)*sq;
  p.scY=1-(1-absSin)*sq;
  // Lean
  const tgtLean=Math.min(p.spd/4,.35);
  p.lean+=(tgtLean-p.lean)*.1;
  p.scX*=(1+p.lean*.1);
  p.scY*=(1-p.lean*.12);
  // Follow-through
  p.headLag+=(p.tilt-p.headLag)*8*dt;
  p.tailLag+=(p.tilt-p.tailLag)*4*dt;
  // Decay when stopped
  if(p.spd<.06){
    p.tilt*=.9;p.bounceY*=.9;
    p.scX+=(1-p.scX)*.1;p.scY+=(1-p.scY)*.1;
    p.headLag*=.9;p.tailLag*=.9;p.lean*=.9;
    p.dirAngle*=.95;
  }
}

// ═══ DRAW ═══
function draw(){
  X.clearRect(0,0,W,H);
  drawSky();
  drawFarBG();
  drawTrack();
  drawSideDetails();
  drawSpectators();
  drawFinishArch();
  // Ducks (further first)
  const ducks=[P,CPU].sort((a,b)=>a.dist-b.dist);
  ducks.forEach(d=>drawDuck(d));
  drawHUD();
  drawPads();
  if(state==='countdown')drawCountdown();
  if(state==='ready')drawReady();
  if(state==='result')drawResult();
}

// ── SKY ──
function drawSky(){
  const g=X.createLinearGradient(0,0,0,VY);
  g.addColorStop(0,'#4A90D9');g.addColorStop(1,'#87CEEB');
  X.fillStyle=g;X.fillRect(0,0,W,VY+10);
  // Clouds
  X.fillStyle='rgba(255,255,255,.7)';
  const t=raceT||0;
  [[80,VY*.25,25],[200,VY*.35,20],[300,VY*.2,18],[50,VY*.45,15]].forEach(([cx,cy,r])=>{
    const x=((cx+t*3)%(W+60))-30;
    X.beginPath();
    X.arc(x,cy,r,0,Math.PI*2);
    X.arc(x+r*.7,cy-r*.3,r*.65,0,Math.PI*2);
    X.arc(x-r*.4,cy+r*.1,r*.5,0,Math.PI*2);
    X.fill();
  });
}

// ── FAR BACKGROUND ──
function drawFarBG(){
  // Tree line at horizon
  X.fillStyle='#2D5A27';
  for(let i=0;i<18;i++){
    const x=i*(W/17);
    const sz=8+Math.sin(i*1.3)*3;
    X.beginPath();
    X.arc(x,VY-sz*.3,sz,Math.PI,0);
    X.fill();
    X.fillStyle='#5D4037';
    X.fillRect(x-1,VY-sz*.3,2,sz*.3);
    X.fillStyle='#2D5A27';
  }
  // Flags
  const avgD=(P.dist+CPU.dist)/2;
  flags.forEach(f=>{
    const rel=((f.along-avgD*.3)%80+80)%80;
    if(rel>50)return;
    const t=1-rel/50;if(t<.05)return;
    const y=VY+(TB-VY)*t;
    const fx=trackX(t,f.side<0?.0:1.0)+f.side*8*t;
    const h=15*t;
    X.strokeStyle='#8D6E63';X.lineWidth=1.5*t;
    X.beginPath();X.moveTo(fx,y);X.lineTo(fx,y-h);X.stroke();
    X.fillStyle=f.color;
    X.beginPath();X.moveTo(fx,y-h);X.lineTo(fx+f.side*6*t,y-h+3*t);X.lineTo(fx,y-h+6*t);X.fill();
  });
}

// ── TRACK ──
function drawTrack(){
  // Grass
  const gg=X.createLinearGradient(0,VY,0,TB+30);
  gg.addColorStop(0,'#4CAF50');gg.addColorStop(1,'#388E3C');
  X.fillStyle=gg;X.fillRect(0,VY,W,TB-VY+30);
  
  // Track surface
  X.fillStyle='#C4A070';
  X.beginPath();
  X.moveTo(W/2-VHW,VY);X.lineTo(TL0,TB);X.lineTo(TR0,TB);X.lineTo(W/2+VHW,VY);
  X.closePath();X.fill();
  
  // Track texture (stripes scrolling)
  const avgD=(P.dist+CPU.dist)/2;
  for(let i=0;i<20;i++){
    const phase=((i*4-flowAcc*2.5)%80+80)%80;
    const t=phase/80;if(t<.02||t>.98)continue;
    const y=VY+(TB-VY)*t;
    const lx=trackX(t,0),rx=trackX(t,1);
    X.fillStyle=i%2===0?'rgba(168,136,77,.3)':'rgba(196,160,112,.15)';
    const h=Math.max(2,(TB-VY)/20*t);
    X.fillRect(lx,y,rx-lx,h);
  }
  
  // Center dash
  X.strokeStyle='rgba(255,255,255,.6)';
  X.lineWidth=2;X.setLineDash([8,12]);
  X.lineDashOffset=-(flowAcc*2.5);
  X.beginPath();X.moveTo(W/2,VY);X.lineTo(W/2,TB);X.stroke();
  X.setLineDash([]);
  
  // Track borders
  X.strokeStyle='#8B6914';X.lineWidth=2;
  X.beginPath();X.moveTo(W/2-VHW,VY);X.lineTo(TL0,TB);X.stroke();
  X.beginPath();X.moveTo(W/2+VHW,VY);X.lineTo(TR0,TB);X.stroke();
  
  // Distance markers
  for(let m=10;m<=TRACK_M;m+=10){
    const rel=m-avgD;if(rel<1||rel>40)continue;
    const t=1-rel/40;
    const y=VY+(TB-VY)*t;
    X.fillStyle=`rgba(255,255,255,${.2+.3*t})`;
    X.font=`bold ${8+6*t}px sans-serif`;
    X.textAlign='center';
    X.fillText(`${m}m`,W/2,y-2);
  }
}

// ── SIDE DETAILS ──
function drawSideDetails(){
  const avgD=(P.dist+CPU.dist)/2;
  // Flowers
  flowers.forEach(f=>{
    const rel=((f.along-avgD*1.2)%100+100)%100;
    if(rel>50)return;
    const t=1-rel/50;if(t<.03)return;
    const y=VY+(TB-VY)*t;
    const bx=trackX(t,f.side<0?0:1);
    const fx=bx+f.side*(5+f.offset*30)*t;
    X.fillStyle=f.color;
    X.beginPath();X.arc(fx,y,f.size*t,0,Math.PI*2);X.fill();
  });
  // Stones
  stones.forEach(s=>{
    const rel=((s.along-avgD*1.1)%100+100)%100;
    if(rel>50)return;
    const t=1-rel/50;if(t<.05)return;
    const y=VY+(TB-VY)*t;
    const bx=trackX(t,s.side<0?0:1);
    const sx=bx+s.side*(2+s.offset*15)*t;
    X.fillStyle='#9E9E9E';
    X.beginPath();X.ellipse(sx,y,s.w*t,s.h*t,0,0,Math.PI*2);X.fill();
    X.fillStyle='#BDBDBD';
    X.beginPath();X.ellipse(sx-s.w*t*.2,y-s.h*t*.3,s.w*t*.5,s.h*t*.4,0,0,Math.PI*2);X.fill();
  });
}

// ── SPECTATORS ──
function drawSpectators(){
  const avgD=(P.dist+CPU.dist)/2;
  const t0=raceT||0;
  spectators.forEach(s=>{
    const rel=((s.along-avgD*.8)%100+100)%100;
    if(rel>45)return;
    const t=1-rel/45;if(t<.04)return;
    const y=VY+(TB-VY)*t;
    const bx=trackX(t,s.side<0?0:1);
    const sx=bx+s.side*(15+s.row*8)*t;
    const sz=4*t;
    const bob=Math.sin(t0*s.bobSpeed+s.bobPhase)*sz*.3;
    // Body
    X.fillStyle='#F5F5F0';
    X.beginPath();X.ellipse(sx,y+bob,sz,sz*.8,0,0,Math.PI*2);X.fill();
    // Head
    X.beginPath();X.arc(sx,y-sz*.7+bob,sz*.45,0,Math.PI*2);X.fill();
    // Beak hint
    X.fillStyle='#FF8F00';
    X.beginPath();X.arc(sx+s.side*sz*.3,y-sz*.65+bob,sz*.15,0,Math.PI*2);X.fill();
  });
}

// ── FINISH ARCH ──
function drawFinishArch(){
  const avgD=(P.dist+CPU.dist)/2;
  const rel=TRACK_M-avgD;
  if(rel<1||rel>40)return;
  const t=1-rel/40;
  const y=VY+(TB-VY)*t;
  const lx=trackX(t,.05),rx=trackX(t,.95);
  const h=20*t;
  // Poles
  X.fillStyle='#8D6E63';
  X.fillRect(lx,y-h,3*t,h);
  X.fillRect(rx-3*t,y-h,3*t,h);
  // Arch
  X.fillStyle='#A1887F';
  X.fillRect(lx,y-h,rx-lx,4*t);
  // Text
  if(t>.2){
    X.fillStyle='#fff';
    X.font=`bold ${6+8*t}px sans-serif`;
    X.textAlign='center';
    X.fillText('FINISH',W/2,y-h+3*t);
  }
  // Checkered
  const segs=10,sw=(rx-lx)/segs;
  for(let s=0;s<segs;s++){
    X.fillStyle=s%2===0?'#333':'#fff';
    X.fillRect(lx+s*sw,y-2*t,sw,4*t);
  }
}

// ── DUCK ──
function drawDuck(p){
  const avgD=(P.dist+CPU.dist)/2;
  const relD=p.dist-avgD;
  const depthT=Math.max(.1,Math.min(1,1-(20-relD)/40));
  const screenY=DUCK_Y+p.bounceY-(relD*3);
  const lane=p.isCpu?.75:.25;
  const screenX=trackX(depthT>1?1:depthT<0?0:Math.min(1,Math.max(0,(TB-screenY)/(TB-VY))),lane);
  const baseSize=DUCK_SZ*(0.7+0.3*depthT);
  const dirShift=Math.sin(p.dirAngle)*baseSize*.3;
  
  X.save();
  X.translate(screenX+dirShift,screenY);
  X.rotate(p.tilt);
  X.scale(p.scX,p.scY);
  
  const dirView=.3+.7*Math.cos(Math.abs(p.dirAngle));
  
  // ── FEET (drawn LAST but calculate here) ──
  const sin=Math.sin(p.wc);
  const leftShow=Math.max(0,sin),rightShow=Math.max(0,-sin);
  
  // Draw feet first (behind body)
  const footY=baseSize*.48;
  const footSpread=baseSize*.18*dirView;
  const footSz=baseSize*.13;
  
  // Left foot
  X.globalAlpha=.6+.4*leftShow;
  drawFoot(-footSpread,footY,footSz*(0.7+leftShow*.3));
  // Right foot
  X.globalAlpha=.6+.4*rightShow;
  drawFoot(footSpread,footY,footSz*(0.7+rightShow*.3));
  X.globalAlpha=1;
  
  // ── BODY ──
  if(sprites.body&&!p.isCpu){
    const bw=baseSize*1.1*dirView,bh=baseSize*1;
    X.drawImage(sprites.body,-bw/2,-bh/2+baseSize*.05,bw,bh);
  }else{
    // Code-drawn body (CPU = black)
    const col=p.isCpu?'#2C2C2C':'#F5F5F0';
    const dark=p.isCpu?'#1A1A1A':'#E0DDD5';
    const bg=X.createRadialGradient(0,0,baseSize*.1,0,baseSize*.05,baseSize*.45);
    bg.addColorStop(0,col);bg.addColorStop(1,dark);
    X.fillStyle=bg;
    X.beginPath();X.ellipse(0,baseSize*.05,baseSize*.4*dirView,baseSize*.38,0,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(0,0,0,.08)';X.lineWidth=1;X.stroke();
    // Wings
    X.fillStyle=dark;
    X.beginPath();X.ellipse(-baseSize*.36*dirView,0,baseSize*.08,baseSize*.18,.1,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(baseSize*.36*dirView,0,baseSize*.08,baseSize*.18,-.1,0,Math.PI*2);X.fill();
  }
  
  // ── TAIL ──
  X.save();
  X.rotate(-p.tailLag*.5);
  const tailY=-baseSize*.32+(-p.lean*baseSize*.08);
  X.fillStyle=p.isCpu?'#3A3A3A':'#FFFDE7';
  X.beginPath();
  X.moveTo(-baseSize*.04,tailY);
  X.quadraticCurveTo(0,tailY-baseSize*.2,baseSize*.04,tailY-baseSize*.12);
  X.quadraticCurveTo(baseSize*.02,tailY-baseSize*.05,baseSize*.03,tailY);
  X.closePath();X.fill();
  X.restore();
  
  // ── HEAD ──
  X.save();
  const headX=p.headLag*baseSize*.12;
  const headY0=-baseSize*.45+(-p.lean*baseSize*.06);
  const headR=baseSize*.18*(1-p.lean*.12);
  X.translate(headX,0);
  
  if(sprites.head&&!p.isCpu){
    const hw=headR*2.8,hh=headR*2.8;
    X.drawImage(sprites.head,-hw/2,headY0-hh/2,hw,hh);
  }else{
    X.fillStyle=p.isCpu?'#2C2C2C':'#F5F5F0';
    X.beginPath();X.arc(0,headY0,headR,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(0,0,0,.06)';X.lineWidth=1;X.stroke();
    // Tuft
    X.fillStyle=p.isCpu?'#1A1A1A':'#E0DDD5';
    X.beginPath();
    X.moveTo(-2,headY0-headR);X.quadraticCurveTo(1,headY0-headR-8,3,headY0-headR-3);
    X.quadraticCurveTo(2,headY0-headR+1,1,headY0-headR);
    X.fill();
  }
  X.restore();
  
  // ── LABEL ──
  X.fillStyle='rgba(255,255,255,.8)';
  X.font=`bold ${baseSize*.15}px sans-serif`;
  X.textAlign='center';
  X.fillText(p.isCpu?'CPU':'YOU',0,-baseSize*.65);
  
  // Band (like reference)
  if(!p.isCpu){
    X.fillStyle='#D32F2F';
    X.fillRect(-baseSize*.12,-baseSize*.25,baseSize*.24,baseSize*.06);
  }else{
    X.fillStyle='#FF8F00';
    X.fillRect(-baseSize*.12,-baseSize*.25,baseSize*.24,baseSize*.06);
  }
  
  X.restore();
}

function drawFoot(fx,fy,sz){
  // Leg bone
  X.strokeStyle='#FF8F00';X.lineWidth=sz*.5;X.lineCap='round';
  X.beginPath();X.moveTo(fx,fy-sz*1.2);X.lineTo(fx,fy);X.stroke();
  // Webbed foot
  X.fillStyle='#FF8F00';
  X.beginPath();X.ellipse(fx,fy+sz*.2,sz,sz*.5,0,0,Math.PI);X.fill();
  // Web lines
  X.strokeStyle='#CC7700';X.lineWidth=.8;
  X.beginPath();
  X.moveTo(fx-sz*.5,fy+sz*.2);X.lineTo(fx,fy+sz*.6);
  X.moveTo(fx,fy+sz*.2);X.lineTo(fx,fy+sz*.6);
  X.moveTo(fx+sz*.5,fy+sz*.2);X.lineTo(fx,fy+sz*.6);
  X.stroke();
}

// ── HUD ──
function drawHUD(){
  const rem=Math.max(0,TIME_LIMIT-raceT);
  // Player
  X.fillStyle='#FFD700';X.font='bold 12px sans-serif';X.textAlign='left';
  X.fillText(`YOU ${P.dist.toFixed(1)}m`,8,16);
  X.fillStyle='rgba(255,255,255,.4)';X.font='10px sans-serif';
  X.fillText(`${P.taps} tap`,8,28);
  // CPU
  X.fillStyle='#FF8C00';X.font='bold 12px sans-serif';X.textAlign='right';
  X.fillText(`CPU ${CPU.dist.toFixed(1)}m`,W-8,16);
  // Timer
  if(state==='racing'||state==='ending'||state==='result'){
    const flash=rem<=3?Math.sin(raceT*12)*.5+.5:0;
    X.fillStyle=rem<=3?`rgba(255,${80+flash*100},${80+flash*100},.9)`:'rgba(255,255,255,.8)';
    X.font='bold 18px sans-serif';X.textAlign='center';
    X.fillText(rem.toFixed(1),W/2,18);
    X.fillStyle='rgba(255,255,255,.3)';X.font='9px sans-serif';
    X.fillText(`남은 시간 · ${TIME_LIMIT}s 한도`,W/2,30);
  }
  // Progress
  const bx=8,bw=W-16,by=34,bh=4;
  X.fillStyle='rgba(0,0,0,.2)';
  X.beginPath();X.roundRect(bx,by,bw,bh,2);X.fill();
  X.fillStyle='#FFD700';
  X.beginPath();X.roundRect(bx,by,bw*Math.min(1,P.dist/TRACK_M),bh,2);X.fill();
  X.fillStyle='#FF8C00';
  X.beginPath();X.arc(bx+bw*Math.min(1,CPU.dist/TRACK_M),by+bh/2,3,0,Math.PI*2);X.fill();
}

// ── PADS ──
function drawPads(){
  if(state!=='racing')return;
  const py=H*.77,pw=W*.42,ph=H*.2,gap=W*.04;
  const lx=W/2-gap/2-pw,rx=W/2+gap/2;
  // Left
  X.fillStyle='rgba(255,193,7,.15)';X.strokeStyle='rgba(255,193,7,.35)';X.lineWidth=2;
  X.beginPath();X.roundRect(lx,py,pw,ph,14);X.fill();X.stroke();
  X.fillStyle='rgba(255,255,255,.6)';X.font='bold 16px sans-serif';X.textAlign='center';
  X.fillText('왼발',lx+pw/2,py+ph/2+6);
  // Right
  X.fillStyle='rgba(255,152,0,.15)';X.strokeStyle='rgba(255,152,0,.35)';
  X.beginPath();X.roundRect(rx,py,pw,ph,14);X.fill();X.stroke();
  X.fillStyle='rgba(255,255,255,.6)';
  X.fillText('오른발',rx+pw/2,py+ph/2+6);
  // Divider
  X.strokeStyle='rgba(255,255,255,.06)';X.lineWidth=1;X.setLineDash([4,4]);
  X.beginPath();X.moveTo(W/2,py);X.lineTo(W/2,H);X.stroke();X.setLineDash([]);
}

// ── COUNTDOWN ──
function drawCountdown(){
  X.fillStyle='rgba(0,0,0,.3)';X.fillRect(0,0,W,H);
  const txt=cdVal>0?''+cdVal:'GO!';
  X.fillStyle=cdVal>0?'#fff':'#FFD700';
  X.font=`bold ${cdVal>0?70:55}px sans-serif`;
  X.textAlign='center';X.textBaseline='middle';
  X.fillText(txt,W/2,H*.38);
  X.textBaseline='alphabetic';
  if(cdVal<=0){
    // Shake
    const shake=Math.sin(cdT*40)*3*(1-cdT);
    X.translate(shake,0);
  }
}

// ── READY ──
function drawReady(){
  X.fillStyle='rgba(0,0,0,.35)';X.fillRect(0,0,W,H);
  X.fillStyle='#FFD700';X.font='bold 30px sans-serif';X.textAlign='center';
  X.fillText('🦆 달려오리',W/2,H*.32);
  X.fillStyle='#ccc';X.font='12px sans-serif';
  X.fillText(`결승 ${TRACK_M}m · 제한시간 ${TIME_LIMIT}초`,W/2,H*.38);
  X.fillText('하단 왼발 / 오른발 번갈아 탭 · PC는 ← →',W/2,H*.42);
  X.fillStyle='#FFD700';X.font='bold 18px sans-serif';
  const pulse=.7+Math.sin(Date.now()/400)*.3;
  X.globalAlpha=pulse;
  X.fillText('START 🏁',W/2,H*.52);
  X.globalAlpha=1;
}

// ── RESULT ──
function drawResult(){
  X.fillStyle='rgba(0,0,0,.45)';X.fillRect(0,0,W,H);
  const win=winner==='YOU';
  X.fillStyle=win?'#FFD700':'#FF6B6B';
  X.font='bold 28px sans-serif';X.textAlign='center';
  X.fillText(win?'🏆 승리! 🏆':'😢 패배...',W/2,H*.35);
  X.fillStyle='#fff';X.font='14px sans-serif';
  X.fillText(`${raceT.toFixed(1)}초 · ${P.taps} taps · ${P.dist.toFixed(1)}m`,W/2,H*.42);
  X.fillStyle='rgba(255,255,255,.5)';X.font='12px sans-serif';
  X.fillText('탭하면 다시 시작',W/2,H*.49);
}

// ═══ LOOP ═══
let lt=0;
function loop(t){
  const dt=Math.min((t-lt)/1000,.05);lt=t;
  X.save();X.scale(sc,sc);
  update(dt);draw();
  X.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
