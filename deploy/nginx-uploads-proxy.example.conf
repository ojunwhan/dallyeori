# dallyeori.com — SPA와 같은 호스트에서 /api 는 이미 Node(예: 3100)로 넘기고 있다면,
# 아바타 정적 경로도 동일 백엔드로 보내야 <img src="/uploads/avatars/..."> 가 200 을 받습니다.
# 기존 upstream 이름에 맞게 `dallyeori_backend` 만 조정해 붙이세요.

# location /api/ { ... } 블록과 같은 server { } 안에 추가:

location /uploads/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# upstream 을 쓰는 경우 예:
# upstream dallyeori_backend { server 127.0.0.1:3100; keepalive 8; }
# location /uploads/ {
#     proxy_pass http://dallyeori_backend;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header Connection "";
# }
